name: Chromatic

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 10

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Chromatic (main branch)
        run: cd ./packages/storybook-native-app && pnpm chromatic --auto-accept-changes
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Run Chromatic
        run: cd ./packages/storybook-native-app && pnpm chromatic --exit-zero-on-changes
        if: ${{ github.ref != 'refs/heads/main' }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
