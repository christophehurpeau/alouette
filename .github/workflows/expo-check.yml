name: Expo Check
permissions:
  contents: read
on: [push]

jobs:
  expo-doctor:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo Doctor
        working-directory: packages/storybook-native-app
        run: pnpm expo install --check

  expo-doctor-fix:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.PUSH_DEPLOY_KEY }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo Doctor
        id: check
        continue-on-error: true
        working-directory: packages/storybook-native-app
        run: pnpm expo install --check

      - name: Expo Install Fix
        if: steps.check.outcome == 'failure'
        working-directory: packages/storybook-native-app
        run: pnpm expo install --fix

      - name: Update lockfile
        if: steps.check.outcome == 'failure'
        run: pnpm install --no-frozen-lockfile

      - name: Check for added or modified files
        id: git-check-modified
        if: steps.check.outcome == 'failure'
        run: if [[ -z $(git status -s) ]]; then echo "modified=false" >> $GITHUB_OUTPUT ; else echo "modified=true" >> $GITHUB_OUTPUT ; fi

      - name: Open or update fix PR
        if: steps.git-check-modified.outputs.modified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="fix/expo-install-check"

          git checkout -b "$BRANCH"
          git add .
          git -c user.name="github-actions[bot]" \
            -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "fix(deps): align expo dependency versions"
          git push --no-verify --force origin "$BRANCH"

          if [ -z "$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')" ]; then
            gh pr create \
              --title "fix(deps): align expo dependency versions" \
              --body "\`expo install --check\` failed on \`main\`. This PR applies \`expo install --fix\` and refreshes the lockfile." \
              --head "$BRANCH" \
              --base "${{ github.event.repository.default_branch }}"
          fi
